services:
  # ===================================================
  # データベース用のコンテナの設定
  # ===================================================
  postgres:
    # 2026年時点の最新は18系、サポートは2030-11-14まで
    image: postgres:18
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_INITDB_ARGS: --auth-local=scram-sha-256 --auth-host=scram-sha-256
    # dbコンテナに渡す機密情報はDocker Secretsを使用して管理
    secrets:
      - db_user
      - db_password
      - db_name
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    expose: # exposeはホストには公開しないが、他のコンテナからはアクセス可能にする
      - "${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$(cat /run/secrets/db_user)\" -d \"$$(cat /run/secrets/db_name)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ===================================================
  # バックエンド用のコンテナの設定
  # ===================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      BACKEND_PORT: "${BACKEND_PORT}"
      NODE_ENV: "${NODE_ENV}"
      PGHOST: "${POSTGRES_HOST}"
      PGPORT: "${POSTGRES_PORT}"
    secrets:
      - db_user
      - db_password
      - db_name
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: bun --watch src/index.ts
    expose:
      - "${BACKEND_PORT}"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT ?? '4000') + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ===================================================
  # フロントエンド用のコンテナの設定
  # ===================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bun-frontend
    working_dir: /app
    environment:
      FRONTEND_PORT: "${FRONTEND_PORT}"
      NODE_ENV: "${NODE_ENV}"
      API_ORIGIN: "${API_ORIGIN}"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: bun --hot src/server.ts
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"

secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  db_name:
    file: ./secrets/db_name.txt

volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules: